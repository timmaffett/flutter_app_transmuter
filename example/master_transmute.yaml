# Example master_transmute.yaml
# Maps brand directory files to their destinations in the Flutter project.
# Used by --copy, --diff, --update, and --switch commands.
#
# Copy this file into your Flutter project root before using the example brands.

file_mappings:
  - source: appicon_square.png
    destination: assets/images/brand/appicon_square.png

  - source: logo_wide.png
    destination: assets/images/brand/logo_wide.png

  - source: splash.png
    destination: assets/images/brand/splash.png

files:
  - transmute.json
  - flutter_launcher_icons.yaml
  - flutter_native_splash.yaml
