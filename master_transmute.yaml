##Example copying one file multiple places##      - android/app/src/main/res/mipmap-xhdpi/ic_launcher_foreground.png
##Example copying one file multiple places##      - android/app/src/main/res/mipmap-xxhdpi/ic_launcher_background.png
##Example copying one file multiple places##      - android/app/src/main/res/mipmap-xxhdpi/ic_launcher_foreground.png
